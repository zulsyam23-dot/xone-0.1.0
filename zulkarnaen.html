<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Website Pertama Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #222;
            color: white;
            padding: 20px;
        }

        section {
            padding: 30px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        footer {
            background-color: #222;
            color: white;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>Selamat Datang</h1>
</header>

<section>
    <h2>Halo Dunia </h2>
    <p>Ini adalah contoh HTML sederhana.</p>
    <button onclick="alert('Tombol diklik!')">Klik Saya</button>
</section>

<footer>
    <p>© 2026 Website Saya</p>
</footer>

</body>
</html>
